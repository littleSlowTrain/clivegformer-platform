syntax = "proto3";

package clivegformer.user.v1;
option go_package = "github.com/clivegformer/platform/contracts/gen/user/v1;userv1";

service UserService {
  rpc Register(RegisterRequest) returns (AuthResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
}

message RegisterRequest { string username = 1; string password = 2; string email = 3; }
message LoginRequest { string username = 1; string password = 2; }
message AuthResponse { uint64 user_id = 1; string username = 2; string email = 3; string role = 4; string token = 5; int64 expires_at = 6; }

