syntax = "proto3";

package clivegformer.file.v1;
option go_package = "github.com/clivegformer/platform/contracts/gen/file/v1;filev1";

service FileService {
  rpc InitiateUpload(InitiateUploadRequest) returns (InitiateUploadResponse);
  rpc GetUpload(GetUploadRequest) returns (UploadInfo);
  rpc ResolveUpload(GetUploadRequest) returns (AuthorizePartResponse);
  rpc AuthorizePart(AuthorizePartRequest) returns (AuthorizePartResponse);
  rpc RecordPart(RecordPartRequest) returns (Empty);
  rpc CompleteUpload(CompleteUploadRequest) returns (UploadInfo);
  rpc PauseUpload(UploadActionRequest) returns (UploadInfo);
  rpc ResumeUpload(UploadActionRequest) returns (UploadInfo);
  rpc HeartbeatUpload(UploadActionRequest) returns (Empty);
  rpc CancelUpload(UploadActionRequest) returns (Empty);
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
  rpc ListFileFacets(ListFileFacetsRequest) returns (ListFileFacetsResponse);
  rpc GetFile(GetFileRequest) returns (FileInfo);
  rpc ResolveDownload(ResolveDownloadRequest) returns (ResolvedObject);
  rpc SearchFiles(SearchFilesRequest) returns (ListFilesResponse);
  rpc AcquireAnalysisCache(AcquireAnalysisCacheRequest) returns (AcquireAnalysisCacheResponse);
  rpc CompleteAnalysisCache(CompleteAnalysisCacheRequest) returns (AnalysisCacheEntry);
  rpc FailAnalysisCache(FailAnalysisCacheRequest) returns (Empty);
}

enum UploadDecision { UPLOAD_DECISION_UNSPECIFIED = 0; INSTANT = 1; UPLOAD = 2; WAIT = 3; }
enum UploadMode { UPLOAD_MODE_UNSPECIFIED = 0; SINGLE = 1; MULTIPART = 2; }
enum UploadStatus { UPLOAD_STATUS_UNSPECIFIED = 0; INIT = 1; UPLOADING = 2; COMPLETE = 3; FAILED = 4; PAUSED = 5; CANCELLED = 6; }
enum AnalysisCacheDecision { ANALYSIS_CACHE_DECISION_UNSPECIFIED = 0; CACHE_HIT = 1; CACHE_COMPUTE = 2; CACHE_WAIT = 3; }

message Empty {}
message InitiateUploadRequest { uint64 user_id = 1; string file_hash = 2; string filename = 3; string folder = 4; int64 file_size = 5; }
message InitiateUploadResponse { UploadDecision decision = 1; UploadInfo upload = 2; FileInfo file = 3; string message = 4; }
message UploadInfo { uint64 upload_id = 1; uint64 user_id = 2; string file_hash = 3; string filename = 4; string folder = 5; int64 file_size = 6; int64 chunk_size = 7; int32 chunk_count = 8; UploadMode mode = 9; UploadStatus status = 10; repeated UploadedPart parts = 11; }
message UploadedPart { int32 part_number = 1; string etag = 2; int64 size = 3; string status = 4; }
message GetUploadRequest { uint64 user_id = 1; uint64 upload_id = 2; }
message AuthorizePartRequest { uint64 user_id = 1; uint64 upload_id = 2; int32 part_number = 3; int64 size = 4; }
message AuthorizePartResponse { string bucket = 1; string object_key = 2; string ceph_upload_id = 3; UploadMode mode = 4; string file_hash = 5; int64 expected_size = 6; }
message RecordPartRequest { uint64 upload_id = 1; int32 part_number = 2; string etag = 3; int64 size = 4; }
message CompleteUploadRequest { uint64 user_id = 1; uint64 upload_id = 2; }
message UploadActionRequest { uint64 user_id = 1; uint64 upload_id = 2; }
message FileInfo { uint64 id = 1; uint64 file_id = 2; string filename = 3; string folder = 4; string file_hash = 5; int64 file_size = 6; string status = 7; int64 created_at = 8; uint64 owner_user_id = 9; string owner_username = 10; int64 reference_count = 11; bool owned_by_me = 12; string region_code = 13; optional uint32 block_index = 14; uint32 data_year = 15; bool classified = 16; }
message ListFilesRequest { uint64 user_id = 1; int32 page = 2; int32 page_size = 3; string query = 4; string folder = 5; string scope = 6; string region_code = 7; uint32 data_year = 8; }
message SearchFilesRequest { uint64 user_id = 1; string query = 2; int32 page = 3; int32 page_size = 4; }
message ListFilesResponse { repeated FileInfo items = 1; int64 total = 2; int32 page = 3; int32 page_size = 4; int64 total_size = 5; }
message ListFileFacetsRequest { uint64 user_id = 1; string scope = 2; }
message ListFileFacetsResponse { repeated string regions = 1; repeated uint32 years = 2; }
message GetFileRequest { uint64 user_id = 1; uint64 user_file_id = 2; }
message ResolveDownloadRequest { uint64 user_id = 1; uint64 user_file_id = 2; }
message ResolvedObject { string bucket = 1; string object_key = 2; string filename = 3; int64 size = 4; string file_hash = 5; }
message AcquireAnalysisCacheRequest { uint64 user_id = 1; uint64 user_file_id = 2; string analysis_type = 3; string parameters_json = 4; string cache_version = 5; string model = 6; }
message AnalysisCacheEntry { uint64 id = 1; uint64 file_id = 2; string cache_key = 3; string result_json = 4; string provider = 5; int64 generated_at = 6; int64 expires_at = 7; }
message AcquireAnalysisCacheResponse { AnalysisCacheDecision decision = 1; AnalysisCacheEntry entry = 2; string lease_token = 3; int32 retry_after_ms = 4; }
message CompleteAnalysisCacheRequest { uint64 id = 1; string lease_token = 2; string result_json = 3; string provider = 4; int32 ttl_seconds = 5; }
message FailAnalysisCacheRequest { uint64 id = 1; string lease_token = 2; string error_message = 3; }
